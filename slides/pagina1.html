<!DOCTYPE html>

    <style>
      html, body { height: 100%; margin: 0; }
      .slide-container {
        height: 720px;
        max-height: 720px;
        width: 1280px;
background-color: #F4F4F4;
        font-family: 'Inter', sans-serif;
        color: #34495E;
        display: flex;
        position: relative;
        overflow: hidden;
      
      }
      .topographic-bg {
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
        opacity: 0.1;
        pointer-events: none;
      }
      .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        border: 1px solid #2C3E50;
        margin: 10px;
        z-index: 1;
      }
      .left-panel {
        padding: 40px 60px 10px 60px; /* keep top padding for title consistency, reduce bottom padding */
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-right: 1px solid #2C3E50;
      }
      .right-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #2C3E50;
        color: #F4F4F4;
      }
      .logo-container {
        margin-bottom: 20px; /* keep original spacing above title */
      }
      .logo-ufpa {
        width: 120px;
        height: auto;
        object-fit: contain;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 44px;
        color: #2C3E50;
        line-height: 1.2;
        margin-bottom: 10px; /* reduced to save vertical space */
      }
      .authors {
        font-size: 22px;
        margin-bottom: 6px;
        display: grid;
        grid-template-columns: 1fr 1fr; /* put authors into two columns to save height */
        gap: 4px 12px;
      }
      .authors p { margin: 2px 0; }
      .institution {
        font-size: 20px;
        color: #E74C3C;
        font-weight: 700;
        margin-top: 6px; /* reduced gap */
      }
      .map-icon {
        font-size: 200px;
        color: #E74C3C;
      }
    </style>
</head>
