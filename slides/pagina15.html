<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
      html,body{height:100%;margin:0;padding:0}
      .slide-container {
        position: relative;
        width: 1280px;
        height: 720px;
        max-height: 720px;
        background-color: #F4F4F4;
        font-family: 'Inter', sans-serif;
        color: #34495E;
        display: flex;
        flex-direction: column;
        border: 1px solid #2C3E50;
        box-sizing: border-box;
        overflow: hidden;
      }
      .header {
        height: 84px;
        padding-top: 25px;
        padding-left: 60px;
        border-bottom: 1px solid #2C3E50;
        box-sizing: border-box;
        flex-shrink: 0;
      }
      h2 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 38px;
        color: #2C3E50;
        margin: 0;
      }
      .main-content {
        display: flex;
        flex-direction: column;
        flex: 1;
        padding: 16px 40px 24px;
        gap: 20px;
        box-sizing: border-box;
        overflow: hidden;
      }
      .image-section {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .image-section img {
        max-width: 1150px;
        max-height: 420px;
        width: 100%;
        object-fit: contain;
        border: 2px solid #2C3E50;
      }
      .legend-section {
        flex: 1;
        display: flex;
        align-items: flex-start;
        border-top: 1px solid #2C3E50;
        padding-top: 18px;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        width: 100%;
      }
      .info-item {
        font-size: 22px;
        line-height: 1.25;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }
      .number-badge {
        background-color: #3498DB;
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        flex-shrink: 0;
        font-size: 18px;
      }
      .highlight {
        font-weight: 700;
        color: #2C3E50;
      }
      p { margin: 0; }
    
      .slide-pagination {
        position: absolute;
        bottom: 16px;
        right: 24px;
        font-family: "Inter", sans-serif;
        font-size: 20px;
        font-weight: 600;
        color: #2c3e50;
        z-index: 10;
        pointer-events: none;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2>Interface do Mapa Cidadão: Histórico de Ocorrências</h2>
        </div>
        <div class="main-content">
            <div class="image-section">
                <img src="../figuras/design_historico.png" alt="Tela de histórico de ocorrências do usuário autenticado no Mapa Cidadão">
            </div>
            <div class="legend-section">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="number-badge">1</div>
                        <p><span class="highlight">Dados exibidos:</span> Tipo, endereço, cidade, estado e data de criação de cada ocorrência.</p>
                    </div>
                    <div class="info-item">
                        <div class="number-badge">2</div>
                        <p><span class="highlight">Status:</span> Indicadores visuais de <span class="highlight">Em Andamento</span> e <span class="highlight">Resolvida</span>.</p>
                    </div>
                </div>
            </div>
        </div>
    
      <div class="slide-pagination">15</div></div>
</body>
</html>
