<!doctype html>
<html lang="pt-BR">
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .slide-container {
        position: relative;
        height: 720px;
        max-height: 720px;
        width: 1280px;
        background-color: #f4f4f4;
        font-family: "Inter", sans-serif;
        color: #34495e;
        display: flex;
        flex-direction: column;
        border: 1px solid #2c3e50;
        box-sizing: border-box;
        overflow: hidden;
      }
      .header {
        height: 84px;
        padding-top: 25px;
        padding-left: 60px;
        border-bottom: 1px solid #2c3e50;
        box-sizing: border-box;
        flex-shrink: 0;
      }
      h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 38px;
        color: #2c3e50;
        margin: 0;
      }
      .main-content {
        display: flex;
        flex: 1;
        min-height: 0;
        font-size: 20px;
      }
      .left-panel {
        flex: 1;
        padding: 28px 52px 28px 60px;
   
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: rgba(142, 68, 173, 0.04);
      }
      .main-content h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 30px;
        margin: 0 0 16px 0;
      }
      h3.fav {
        color: #27ae60;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .main-content li {
        margin-bottom: 18px;
        line-height: 1.35;
        display: flex;
        align-items: flex-start;
      }
      li:last-child {
        margin-bottom: 0;
      }
      .main-content .left-panel li i {
        color: #27ae60;
        margin-right: 14px;
        margin-top: 7px;
        font-size: 20px;
        flex-shrink: 0;
      }
      .main-content .item-title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #2c3e50;
        line-height: 1.25;
        margin: 0 0 6px 0;
      }
      .main-content .item-body {
        font-size: 20px;
        line-height: 1.35;
        margin: 0;
        color: #34495e;
      }
      .highlight {
        font-weight: 700;
        color: #2c3e50;
      }
      .item-content {
        flex: 1;
        min-width: 0;
      }
    
      .slide-pagination {
        position: absolute;
        bottom: 16px;
        right: 24px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #95a5a6;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="header">
        <h2>Análise de Experiência do Usuário</h2>
      </div>
      <div class="main-content">
        <div class="left-panel">
          <h3 class="fav">Aspectos favoráveis</h3>
          <ul>
            <li>
              <i class="fas fa-check-circle"></i>
              <div class="item-content">
                <p class="item-title">
                  Utilidade para cidadão e gestão pública
                </p>
                <p class="item-body">
                  P3: duplo valor —
                  <span class="highlight">cidadão</span> (visão da
                  região/bairro) e
                  <span class="highlight">poder público</span> (demonstrar onde
                  existem problemas). Utilidade social e institucional com
                  expectativa de uso territorial (P3).
                </p>
              </div>
            </li>
          </ul>
        </div>
      </div>
    
      <div class="slide-pagination">25</div></div>
  </body>
</html>
