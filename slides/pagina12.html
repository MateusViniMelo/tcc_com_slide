<!doctype html>
<html lang="pt-BR">
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .slide-container {
        position: relative;
        height: 720px;
        max-height: 720px;
        width: 1280px;
        background-color: #f4f4f4;
        font-family: "Inter", sans-serif;
        color: #34495e;
        display: flex;
        flex-direction: column;
        border: 1px solid #2c3e50;
        box-sizing: border-box;
        overflow: hidden;
      }
      .header {
        height: 84px;
        padding-top: 25px;
        padding-left: 60px;
        border-bottom: 1px solid #2c3e50;
        box-sizing: border-box;
      }
      h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 38px;
        color: #2c3e50;
        margin: 0;
      }
      .intro-bar {
        padding: 16px 60px;
        border-bottom: 1px solid #2c3e50;
       
        box-sizing: border-box;
      }
      .intro-text {
        font-size: 22px;
        line-height: 1.35;
        margin: 0;
      }
      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 40px 32px;
        box-sizing: border-box;
        background-color: #e1edf9;
      }
      .figure-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .figure-wrapper img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
     
        background-color: #ffffff;
      }
    
      .slide-pagination {
        position: absolute;
        bottom: 16px;
        right: 24px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #95a5a6;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <div class="header">
        <h2>Metodologia</h2>
      </div>
      <div class="intro-bar">
        <p class="intro-text">
          Abordagem qualitativa e exploratória, estruturada em quatro etapas
          sequenciais — do desenvolvimento do sistema à análise dos resultados.
        </p>
      </div>
      <div class="main-content">
        <div class="figure-wrapper">
          <img
            src="../figuras/figura_etapas_3.jpg"
            alt="Etapas da metodologia: Desenvolvimento do Sistema, Definição de Personas e Tarefas, Coleta de Dados e Análise dos Resultados"
          />
        </div>
      </div>
    
      <div class="slide-pagination">12</div></div>
  </body>
</html>
